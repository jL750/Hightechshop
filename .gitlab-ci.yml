# ─────────────────────────────────────────────────────────────────────────────
# Pipeline GitLab CI — Hightechshop
# 1. test   → tests unitaires Vitest
# 2. build  → build de production Vite
# 3. deploy → déploiement sur GitLab Pages
# ─────────────────────────────────────────────────────────────────────────────

image: node:22-alpine

stages:
  - test
  - build
  - deploy

# ── Cache des dépendances ─────────────────────────────────────────────────────
cache:
  key:
    files:
      - myprojet/package-lock.json
  paths:
    - myprojet/node_modules/

# ── Job 1 : tests unitaires front-end ────────────────────────────────────────
test:front-end:
  stage: test

  before_script:
    - cd myprojet
    - npm ci --prefer-offline

  script:
    - npm test -- --run --reporter=verbose

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - myprojet/test-results/

# ── Job 2 : build de production ───────────────────────────────────────────────
build:front-end:
  stage: build

  before_script:
    - cd myprojet
    - npm ci --prefer-offline

  script:
    - npm run build -- --base /$CI_PROJECT_NAME/

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

  artifacts:
    expire_in: 1 hour
    paths:
      - myprojet/dist/

# ── Job 3a : marquage de l'environnement production ──────────────────────────
deploy:production:
  stage: deploy
  needs:
    - build:front-end

  script:
    - echo "Deploying to production…"

  environment:
    name: production
    url: https://$CI_PROJECT_NAMESPACE.gitlab.io/$CI_PROJECT_NAME

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ── Job 3b : déploiement GitLab Pages ────────────────────────────────────────
# GitLab ajoute automatiquement « pages:deploy » après ce job
pages:
  stage: deploy
  needs:
    - build:front-end

  script:
    - mv myprojet/dist public

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

  artifacts:
    paths:
      - public
